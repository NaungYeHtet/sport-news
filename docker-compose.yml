services:
  postgres:
    image: postgres:16-alpine
    container_name: sport-news-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sportnews
      POSTGRES_PASSWORD: sportnews_dev
      POSTGRES_DB: sportnews
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
